[server]
# Service bind address. Use 0.0.0.0 in Docker; use 127.0.0.1 for local-only access.
host = 0.0.0.0

# Service bind port. docker-compose maps host 8001 to container 8000 by default.
port = 8000

# Flask debug mode. Keep false in production.
debug = false

# Allowed CORS origins, comma-separated. Use * to allow all origins.
cors_origins = *

[ocr]
# EasyOCR languages, comma-separated. Common default: ch_sim,en.
languages = ch_sim,en

# Enable GPU. Keep false unless CUDA/GPU runtime is correctly configured.
gpu = false

# Maximum request body size in bytes. 52428800 = 50MB.
max_content_length = 52428800

# Maximum PDF pages per request to protect CPU and memory.
max_pdf_pages = 10

# PDF render DPI. Higher values improve OCR quality but cost more CPU/memory.
pdf_dpi = 200

# Maximum number of images accepted by /ocr/batch.
max_batch_size = 10

# Maximum pixels per image, width * height. 25000000 is about 25MP.
max_image_pixels = 25000000

# Allowed image extensions. PDF is supported separately.
supported_image_extensions = .png,.jpg,.jpeg,.bmp,.webp,.tif,.tiff
