[server]
# 服务监听地址。Docker 内通常用 0.0.0.0，本地只给本机访问可改为 127.0.0.1。
host = 0.0.0.0

# 服务监听端口。docker-compose 默认映射为宿主机 8001 -> 容器 8000。
port = 8000

# Flask debug 开关。生产环境保持 false。
debug = false

# 允许跨域来源，多个来源用英文逗号分隔。* 表示允许所有来源。
cors_origins = *

[ocr]
# EasyOCR 识别语言，多个语言用英文逗号分隔。常用：ch_sim,en。
languages = ch_sim,en

# 是否启用 GPU。容器/宿主机没有正确 CUDA 环境时保持 false。
gpu = false

# 单次请求体最大字节数。默认 52428800 = 50MB。
max_content_length = 52428800

# 单个 PDF 最多处理页数，避免大 PDF 拖垮服务。
max_pdf_pages = 10

# PDF 渲染 DPI。越高越清晰，但越慢、越耗内存。
pdf_dpi = 200

# /ocr/batch 单次最多处理图片数量。
max_batch_size = 10

# 单张图片最大像素数，宽 * 高。默认 25000000 约等于 25MP。
max_image_pixels = 25000000

# 允许上传的图片扩展名，PDF 会额外固定支持。
supported_image_extensions = .png,.jpg,.jpeg,.bmp,.webp,.tif,.tiff
