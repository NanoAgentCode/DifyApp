version: '3.8'

services:
  easyocr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_CHINA_MIRROR: "false"  # 设置为 "true" 使用国内镜像源
    image: difyapp/easyocr:latest
    container_name: easyocr-service
    ports:
      - "8001:8000"  # 使用 8001 端口避免与其他服务冲突
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - TZ=Asia/Shanghai
    volumes:
      # 可选：挂载模型目录以加速后续启动（模型会下载到容器内）
      - easyocr-models:/root/.EasyOCR
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # 首次启动需要下载模型，给足够时间
    # 资源限制（根据实际情况调整）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  easyocr-models:
    driver: local
