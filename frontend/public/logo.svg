<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#66B1FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85C1FF;stop-opacity:1" />
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#mainGrad)"/>
  <circle cx="100" cy="100" r="90" fill="url(#highlightGrad)"/>
  
  <!-- 中心N字母（Nano） -->
  <g transform="translate(100, 100)">
    <!-- N字母主体 -->
    <path d="M-35,-45 L-35,45 L-20,45 L-20,-5 L20,45 L35,45 L35,-45 L20,-45 L20,5 L-20,-45 Z" 
          fill="white" opacity="0.95" filter="url(#shadow)"/>
    
    <!-- 智能连接点 -->
    <circle cx="-25" cy="-30" r="4" fill="#409EFF" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF" opacity="0.9"/>
    <circle cx="25" cy="30" r="4" fill="#409EFF" opacity="0.9"/>
    
    <!-- 连接线（表示智能网络） -->
    <line x1="-25" y1="-30" x2="0" y2="0" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="30" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    
    <!-- 额外的智能节点 -->
    <circle cx="-15" cy="15" r="3" fill="white" opacity="0.7"/>
    <circle cx="15" cy="-15" r="3" fill="white" opacity="0.7"/>
  </g>
  
  <!-- 外圈装饰（科技感） -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="white" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,4"/>
</svg>
