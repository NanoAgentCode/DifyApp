<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#66B1FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85C1FF;stop-opacity:1" />
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#mainGrad)"/>
  <circle cx="64" cy="64" r="60" fill="url(#highlightGrad)"/>
  
  <!-- 中心N字母（Nano） -->
  <g transform="translate(64, 64)">
    <!-- N字母主体 -->
    <path d="M-22,-28 L-22,28 L-13,28 L-13,-3 L13,28 L22,28 L22,-28 L13,-28 L13,3 L-13,-28 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 智能连接点 -->
    <circle cx="-16" cy="-19" r="2.5" fill="#409EFF" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#409EFF" opacity="0.9"/>
    <circle cx="16" cy="19" r="2.5" fill="#409EFF" opacity="0.9"/>
    
    <!-- 连接线 -->
    <line x1="-16" y1="-19" x2="0" y2="0" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="16" y2="19" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  </g>
</svg>
