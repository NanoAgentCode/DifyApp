<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66B1FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>
  
  <!-- AI 大脑图标 -->
  <g transform="translate(64, 64)">
    <!-- 大脑轮廓 -->
    <path d="M-20,-15 Q-25,-25 -20,-35 Q-15,-40 -5,-40 Q5,-40 10,-35 Q15,-30 15,-20 Q15,-10 10,-5 Q5,0 0,0 Q-5,0 -10,-5 Q-15,-10 -15,-15 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- 连接节点 -->
    <circle cx="-12" cy="-20" r="3" fill="#409EFF"/>
    <circle cx="0" cy="-25" r="3" fill="#409EFF"/>
    <circle cx="12" cy="-20" r="3" fill="#409EFF"/>
    <circle cx="-8" cy="-10" r="2.5" fill="#409EFF"/>
    <circle cx="8" cy="-10" r="2.5" fill="#409EFF"/>
    
    <!-- 连接线 -->
    <line x1="-12" y1="-20" x2="0" y2="-25" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-25" x2="12" y2="-20" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-12" y1="-20" x2="-8" y2="-10" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="-20" x2="8" y2="-10" stroke="white" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- D 字母（Dify） -->
  <text x="64" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">D</text>
</svg>
