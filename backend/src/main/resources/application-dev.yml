spring:
  config:
    import:
      - application-static.yml  # 静态配置
      - application-hikari.yml  # HikariCP连接池配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/difyapp
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境使用update，自动更新表结构
    show-sql: false  # 可设置为true查看SQL
  data:
    redis:
      host: localhost
      port: 6379
      password:  # Redis密码（可选）

jwt:
  secret: dify-app-secret-key-2024-this-is-a-very-long-secret-key-for-security  # JWT密钥，生产环境请修改

minio:
  endpoint: http://localhost:19000
  access-key: rustfsadmin
  secret-key: rustfsadmin

observability:
  enabled: true
  thread-pool:
    core-size: 4
    max-size: 8
    queue-capacity: 500
