spring:
  datasource:
    hikari:
      pool-name: DifyAppHikariCP  # 连接池名称
      maximum-pool-size: 20  # 最大连接数（环境特定配置会覆盖）
      minimum-idle: 5  # 最小空闲连接数（环境特定配置会覆盖）
      connection-timeout: 30000  # 连接超时时间（毫秒）
      idle-timeout: 600000  # 空闲连接超时时间（毫秒，10分钟）
      max-lifetime: 1800000  # 连接最大存活时间（毫秒，30分钟）
      validation-timeout: 5000  # 验证超时时间（毫秒）
      connection-test-query: SELECT 1  # 连接测试查询
      leak-detection-threshold: 60000  # 泄漏检测阈值（毫秒）
      allow-pool-suspension: false  # 是否允许连接池挂起
      read-only: false  # 是否只读
      auto-commit: true  # 是否自动提交（Spring事务管理会覆盖）

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    hikari:
      maximum-pool-size: 10  # 开发环境使用较小的连接池
      minimum-idle: 2
      leak-detection-threshold: 30000  # 启用连接泄漏检测（30秒）

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 50  # 生产环境增加连接池大小
      minimum-idle: 10
      leak-detection-threshold: 0  # 关闭连接泄漏检测（避免性能影响）
      max-lifetime: 3600000  # 增加连接最大存活时间（1小时）
      idle-timeout: 300000  # 缩短空闲连接超时时间（5分钟）
