server:
  port: 8081

# 日志配置
logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    # 控制台使用彩色输出（使用 %highlight 和 %cyan 等 Logback 标准转换器）
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{50}) - %msg%n"
    # 文件不使用彩色（避免ANSI码污染日志文件）
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

---
spring:
  # 启用ANSI彩色输出（控制台）
  output:
    ansi:
      enabled: always  # 可选值: always, never, detect（自动检测）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/difyapp
    username: postgres
    password: 123456
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false  # 关闭SQL打印
    open-in-view: false
    properties:
      hibernate:
        format_sql: false  # 关闭SQL格式化（因为show-sql已关闭）
  # Elasticsearch配置（使用 Spring Boot 标准配置）
  elasticsearch:
    uris: http://localhost:9200
    username: elastic # 如果使用用户名密码认证
    password: NaP2emL-bM2Lljjau_mz # 如果使用用户名密码认证
    connection-timeout: 30s
    socket-timeout: 30s
  # 禁用 Spring Data Elasticsearch Repository 扫描（我们只使用 RestClient，不使用 Repository）
  data:
    elasticsearch:
      repositories:
        enabled: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    # 异步请求超时时间（毫秒），设置为10分钟以支持长时间运行的Workflow任务
    async:
      request-timeout: 600000
  servlet:
    multipart:
      # 单个文件最大大小（100MB，知识库文件上传）
      max-file-size: 100MB
      # 整个请求最大大小（200MB，允许同时上传多个文件）
      max-request-size: 200MB
      # 文件写入磁盘的阈值（超过此大小会写入临时文件）
      file-size-threshold: 2MB
# JWT配置
jwt:
  # JWT密钥（生产环境请修改为更安全的密钥，至少32个字符以确保256位安全性）
  secret: dify-app-secret-key-2024-this-is-a-very-long-secret-key-for-security
  # JWT过期时间（毫秒），默认7天
  expiration: 604800000

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: knowledge-base

# Qdrant配置
qdrant:
  url: http://localhost:6333
  api-key: # 可选，Docker部署默认不需要，仅在启用认证时需要
  timeout: 30000

# Milvus配置
milvus:
  url: http://localhost:19530  # Milvus HTTP API地址
  api-key: # 可选，如果Milvus启用了认证，请配置API Key
  timeout: 30000

# FAISS配置 (Facebook AI Similarity Search - 正确的库名)
faiss:
  base-path: ./data/faiss  # FAISS索引文件的基础存储路径

# Chroma配置
chroma:
  url: http://localhost:8000
  api-key: # 可选，Docker部署默认不需要，仅在启用认证时需要
  timeout: 30000

---
# Redis配置
spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: # 可选，如果Redis设置了密码，请在此配置
      database: 0
      timeout: 3000
      # 禁用Redis Repositories自动配置（我们只使用缓存功能，不使用Redis Repository）
      repositories:
        enabled: false

# RAG配置（仅保留非模型相关配置，模型配置已迁移到数据库）
rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 10  # 增加检索数量，从5增加到10
  similarity-threshold: 0.3  # 降低相似度阈值，从0.7降低到0.3，允许更多相关结果通过
  # 上下文压缩配置（用于连续对话时压缩历史上下文）
  enable-context-compression: true  # 是否启用上下文压缩
  compression-strategy: sliding_window  # 压缩策略：sliding_window（滑动窗口）、summary（总结）、hybrid（混合）
  max-history-rounds: 10  # 最大历史对话轮数（滑动窗口策略，每轮包含一问一答）
  max-history-tokens: 2000  # 最大历史对话token数（用于判断是否需要压缩）
  enable-summary: false  # 是否启用总结压缩（需要额外调用LLM，会增加延迟和成本）

# 注意：
# - 模型配置（LLM和Embedding）已迁移到数据库，请在管理端"大模型管理"页面配置
# - ConfigurableDocumentSplitter 使用 rag.chunk-size 和 rag.chunk-overlap 配置

# MCP (Model Context Protocol) 配置（自定义配置属性，通过 McpConfig 类绑定）
mcp:
  # 浏览器搜索服务配置
  browser-search:
    searxng-base-url: http://localhost:10086  # SearX-NG服务地址
    timeout: 10                               # 请求超时时间（秒）
    default-max-results: 5                    # 默认最大搜索结果数
    enable-query-optimization: true           # 是否启用查询优化（自动添加时间限制等）
    # 默认搜索引擎（多个用逗号分隔，例如：google,bing,duckduckgo）
    # 如果为空，则使用SearX-NG的默认配置
    # 常用搜索引擎：google, bing, duckduckgo, brave, yandex, baidu, sogou, 360
    default-engines: "duckduckgo,brave"
  # 地理位置服务配置
  location:
    enabled: true                              # 是否启用地理位置服务
    cache-seconds: 3600                       # 地理位置信息缓存时间（秒，默认1小时）
    timeout: 10                               # 请求超时时间（秒）
  # 时间服务配置
  time:
    default-time-zone: Asia/Shanghai          # 默认时区
    cache-seconds: 1                          # 时间信息缓存时间（秒，避免频繁获取）
  # 实时信息检测配置
  realtime-info-detector:
    enabled: true                              # 是否启用实时信息检测
    confidence-threshold: 0.3                 # 检测置信度阈值（0.0-1.0），超过此值才认为是实时信息问题（降低阈值使检测更宽松）