# ============================================
# 生产环境配置 - 需要根据环境修改的配置
# ============================================

# 引入静态配置和HikariCP配置
spring:
  config:
    import: 
      - application-static.yml
      - application-hikari.yml
  # 数据源配置（需要根据环境修改）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/difyapp
    username: user_fcPsSr
    password: password_Xw4iyM
  # JPA配置（生产环境特定）
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用 validate，确保数据库结构正确
    show-sql: false  # 生产环境关闭SQL打印
  # Redis配置（需要根据环境修改）
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_xdYB4S # 可选，如果Redis设置了密码，请在此配置

# JWT配置（需要根据环境修改密钥）
jwt:
  # JWT密钥（生产环境请修改为更安全的密钥，至少32个字符以确保256位安全性）
  secret: dify-app-secret-key-2024-this-is-a-very-long-secret-key-for-security

# MinIO配置（需要根据环境修改）
minio:
  endpoint: http://localhost:9000
  access-key: rustfsadmin
  secret-key: rustfsadmin

# 可观测性监控配置
observability:
  # 是否启用监控（默认启用）
  enabled: true
  # 监控线程池配置（生产环境可以适当增大）
  thread-pool:
    # 核心线程数
    core-size: 8
    # 最大线程数
    max-size: 16
    # 队列容量
    queue-capacity: 1000
