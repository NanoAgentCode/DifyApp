logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{50}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

spring:
  config:
    import: application-mcp-rag.yml  # MCP 与 RAG 配置（独立文件）
  output:
    ansi:
      enabled: always  # 控制台ANSI颜色输出
  jpa:
    open-in-view: false  # 关闭OpenSessionInView，避免性能问题
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50  # 批量处理大小
          batch_versioned_data: true
        order_inserts: true  # 排序插入，提升批量插入性能
        order_updates: true  # 排序更新，提升批量更新性能
        default_batch_fetch_size: 20  # 默认批量获取大小
        generate_statistics: false  # 关闭统计信息生成
  data:
    redis:
      database: 0
      timeout: 3000  # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 20  # 最大活跃连接数
          max-idle: 10  # 最大空闲连接数
          min-idle: 5  # 最小空闲连接数
          max-wait: 3000  # 最大等待时间（毫秒）
      repositories:
        enabled: false  # 禁用Redis Repository
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 路径匹配策略
    async:
      request-timeout: 600000  # 异步请求超时时间（毫秒，10分钟）
  servlet:
    multipart:
      max-file-size: 100MB  # 单个文件最大大小
      max-request-size: 200MB  # 请求最大大小
      file-size-threshold: 2MB  # 文件大小阈值（超过此大小写入磁盘）
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 缓存过期时间（毫秒，1小时）
      cache-null-values: false  # 不缓存null值
      use-key-prefix: true  # 使用键前缀
      key-prefix: "difyapp:"  # 键前缀

management:
  health:
    elasticsearch:
      enabled: false  # 禁用Elasticsearch健康检查
    neo4j:
      enabled: false  # 禁用Neo4j健康检查

server:
  port: 9090  # 应用端口

jwt:
  expiration: 604800000  # Token过期时间（毫秒，7天）

minio:
  bucket-name: knowledge-base  # 默认存储桶名称
