# ============================================
# 静态配置 - 不需要修改的配置
# ============================================

# 日志配置
logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{50}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

---
spring:
  output:
    ansi:
      enabled: always
  
  datasource:
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
      pool-name: DifyAppHikariPool
      register-mbeans: true
  
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        jdbc.batch_size: 50
        default_batch_fetch_size: 20
        generate_statistics: false
  
  data:
    elasticsearch:
      repositories:
        enabled: false
  
  # 禁用Elasticsearch健康检查（避免与客户端版本冲突）
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.data.elasticsearch.ElasticsearchReactiveHealthContributorAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.elasticsearch.ElasticsearchHealthContributorAutoConfiguration
    redis:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
      repositories:
        enabled: false
  
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    async:
      request-timeout: 600000
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 2MB
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "difyapp:"

# RAG配置
rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 10
  similarity-threshold: 0.3
  enable-context-compression: true
  compression-strategy: sliding_window
  max-history-rounds: 10
  max-history-tokens: 2000
  enable-summary: false

# MCP配置
mcp:
  browser-search:
    # 商业搜索API（按优先级自动选择）
    tavily-api-key: "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"        # Tavily API密钥（推荐）
    serp-api-key: ""          # SerpAPI密钥
    serp-engine: "google"     # SerpAPI搜索引擎
    bing-api-key: ""          # Bing API密钥
    # 本地搜索服务（降级方案）
    searxng-base-url: "http://localhost:10086"
    # 通用配置
    timeout: 10
    default-max-results: 5
    enable-query-optimization: true
    default-engines: "duckduckgo,brave"
  time:
    default-time-zone: Asia/Shanghai
    cache-seconds: 1
  realtime-info-detector:
    enabled: true
    confidence-threshold: 0.3