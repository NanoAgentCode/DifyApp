version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difyapp-backend
    ports:
      - "6060:6060"
    environment:
      - TZ=Asia/Shanghai
      # Spring Boot配置可以通过环境变量覆盖
      # 例如：SPRING_DATASOURCE_URL=jdbc:postgresql://host:port/database
    volumes:
      # 挂载日志目录（可选，用于持久化日志）
      - ./backend/logs:/app/logs
      # 挂载数据目录（如果需要持久化FAISS等数据）
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - difyapp-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: difyapp-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - difyapp-network

networks:
  difyapp-network:
    driver: bridge

