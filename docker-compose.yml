services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difyapp-backend
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    env_file:
      - ./.env
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/postgres}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://rustfs:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-rustfsadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-rustfsadmin}
      - JWT_SECRET=${JWT_SECRET:-}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_DATA_REDIS_PASSWORD:-}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@difyapp.local}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-true}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE:-true}
      - MAIL_SMTP_STARTTLS_REQUIRED=${MAIL_SMTP_STARTTLS_REQUIRED:-false}
      - EMAIL_CODE_TTL_MINUTES=${EMAIL_CODE_TTL_MINUTES:-5}
      - EMAIL_CODE_COOLDOWN_SECONDS=${EMAIL_CODE_COOLDOWN_SECONDS:-60}
      - EMAIL_CODE_HOURLY_LIMIT=${EMAIL_CODE_HOURLY_LIMIT:-10}
      - EMAIL_CODE_MAX_ATTEMPTS=${EMAIL_CODE_MAX_ATTEMPTS:-5}
      # Spring Boot配置可以通过环境变量覆盖
      # 例如：SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
      # SPRING_DATASOURCE_USERNAME=postgres
      # SPRING_DATASOURCE_PASSWORD=123456
      # MINIO_ENDPOINT=http://rustfs:9000  # RustFS 100% 兼容 MinIO 配置
      # MINIO_ACCESS_KEY=rustfsadmin
      # MINIO_SECRET_KEY=rustfsadmin
      # SPRING_DATA_REDIS_HOST=redis  # 如果使用 Redis
      # SPRING_DATA_REDIS_PORT=6379
    volumes:
      # 挂载日志目录（可选，用于持久化日志）
      - ./backend/logs:/app/logs
      # 挂载数据目录（如果需要持久化FAISS等数据）
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - difyapp-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9090}
    container_name: difyapp-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - difyapp-network

  # PostgreSQL 数据库（从外部依赖服务引用）
  postgres:
    image: ankane/pgvector:latest
    container_name: difyapp-postgres
    ports:
      - "15432:5432"
    env_file:
      - ./.env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - difyapp-network

  # Redis：缓存及邮箱验证码的一次性存储
  redis:
    image: redis:7-alpine
    container_name: difyapp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - difyapp-network

  # RustFS 对象存储（从外部依赖服务引用）
  rustfs:
    image: rustfs/rustfs:latest
    container_name: difyapp-rustfs
    ports:
      - "9000:9000"  # S3 API端口
      - "9001:9001"  # 控制台端口
    env_file:
      - ./.env
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ADDRESS=:9000
    volumes:
      - rustfs-data:/data
    command:
      - /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - difyapp-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rustfs-data:
    driver: local

networks:
  difyapp-network:
    driver: bridge

