<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#66B1FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#85C1FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGrad)"/>
  
  <!-- AI 大脑图标 -->
  <g transform="translate(100, 80)">
    <!-- 大脑轮廓 -->
    <path d="M-30,-20 Q-35,-35 -30,-50 Q-20,-55 -5,-55 Q10,-55 20,-50 Q30,-40 30,-25 Q30,-10 20,-5 Q10,0 0,0 Q-10,0 -20,-5 Q-30,-10 -30,-20 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 连接节点 -->
    <circle cx="-18" cy="-30" r="4" fill="#409EFF"/>
    <circle cx="0" cy="-35" r="4" fill="#409EFF"/>
    <circle cx="18" cy="-30" r="4" fill="#409EFF"/>
    <circle cx="-12" cy="-15" r="3.5" fill="#409EFF"/>
    <circle cx="12" cy="-15" r="3.5" fill="#409EFF"/>
    
    <!-- 连接线 -->
    <line x1="-18" y1="-30" x2="0" y2="-35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-35" x2="18" y2="-30" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="-18" y1="-30" x2="-12" y2="-15" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="18" y1="-30" x2="12" y2="-15" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Dify 文字 -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Dify</text>
</svg>
