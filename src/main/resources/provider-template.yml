# ============================================
# AI 模型提供商配置模板
# ============================================
# 
# 此文件展示了如何配置不同的 AI 模型提供商
# 请根据您的实际需求选择合适的配置，并复制到 application.yml 中
#
# 支持的提供商类型：
# - openai: OpenAI 兼容格式（包括 OpenAI、SiliconFlow、VLLM 等）
# - ollama: Ollama 本地模型服务
#
# ============================================

# ============================================
# 方案一：使用 OpenAI 兼容格式（默认）
# 适用于：OpenAI、SiliconFlow、VLLM 等
# ============================================
embedding:
  api-url: https://api.siliconflow.cn/v1/embeddings  # 或只配置基础URL: https://api.siliconflow.cn
  api-key: your-api-key-here
  model: Qwen/Qwen3-Embedding-8B
  timeout: 300000
  batch-size: 100
  provider: openai  # 或省略，默认为 openai

rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 10
  similarity-threshold: 0.3
  llm-api-url: https://api.siliconflow.cn  # 或只配置基础URL
  llm-api-key: your-api-key-here
  llm-model: Qwen/Qwen2.5-72B-Instruct
  provider: openai  # 或省略，默认为 openai

# ============================================
# 方案二：使用 VLLM（兼容 OpenAI API）
# ============================================
# embedding:
#   api-url: http://localhost:8000  # VLLM 服务地址（不包含路径）
#   api-key: # VLLM 通常不需要 API Key，除非启用了认证
#   model: Qwen/Qwen3-Embedding-8B
#   timeout: 300000
#   batch-size: 100
#   provider: openai  # VLLM 兼容 OpenAI API，使用 openai 类型

# rag:
#   chunk-size: 500
#   chunk-overlap: 50
#   top-k: 10
#   similarity-threshold: 0.3
#   llm-api-url: http://localhost:8000  # VLLM 服务地址（不包含路径）
#   llm-api-key: # VLLM 通常不需要 API Key，除非启用了认证
#   llm-model: Qwen/Qwen2.5-72B-Instruct
#   provider: openai  # VLLM 兼容 OpenAI API，使用 openai 类型

# ============================================
# 方案三：使用 Ollama（本地模型服务）
# ============================================
# embedding:
#   api-url: http://localhost:11434  # Ollama 服务地址（不包含路径）
#   api-key: # Ollama 不需要 API Key，可留空
#   model: nomic-embed-text  # Ollama 模型名称，例如：nomic-embed-text, mxbai-embed-large
#   timeout: 300000
#   batch-size: 100
#   provider: ollama  # 指定使用 Ollama

# rag:
#   chunk-size: 500
#   chunk-overlap: 50
#   top-k: 10
#   similarity-threshold: 0.3
#   llm-api-url: http://localhost:11434  # Ollama 服务地址（不包含路径）
#   llm-api-key: # Ollama 不需要 API Key，可留空
#   llm-model: qwen2.5:72b  # Ollama 模型名称，例如：qwen2.5:72b, llama3:70b
#   provider: ollama  # 指定使用 Ollama

# ============================================
# 方案四：混合配置（Embedding 使用 Ollama，LLM 使用 OpenAI）
# ============================================
# embedding:
#   api-url: http://localhost:11434
#   api-key:
#   model: nomic-embed-text
#   timeout: 300000
#   batch-size: 100
#   provider: ollama

# rag:
#   chunk-size: 500
#   chunk-overlap: 50
#   top-k: 10
#   similarity-threshold: 0.3
#   llm-api-url: https://api.siliconflow.cn
#   llm-api-key: your-api-key-here
#   llm-model: Qwen/Qwen2.5-72B-Instruct
#   provider: openai

# ============================================
# 配置说明
# ============================================
#
# 1. provider 字段说明：
#    - openai: 使用 OpenAI 兼容格式（默认）
#    - ollama: 使用 Ollama 格式
#    - 如果省略 provider 字段，默认使用 openai
#
# 2. api-url 配置说明：
#    - 如果 URL 已经包含完整路径（如 /v1/embeddings），则直接使用
#    - 如果 URL 只包含基础地址（如 http://localhost:11434），系统会根据 provider 自动添加路径
#
# 3. api-key 配置说明：
#    - OpenAI 兼容格式：通常需要 API Key
#    - Ollama：不需要 API Key，可留空
#    - VLLM：通常不需要 API Key，除非启用了认证
#
# 4. 模型名称说明：
#    - OpenAI 兼容格式：使用完整的模型标识符，如 Qwen/Qwen3-Embedding-8B
#    - Ollama：使用 Ollama 模型名称，如 nomic-embed-text 或 qwen2.5:72b
#
# ============================================

