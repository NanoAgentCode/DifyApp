server:
  port: 8081

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/difyapp
    username: postgres
    password: 123456
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    # 异步请求超时时间（毫秒），设置为10分钟以支持长时间运行的Workflow任务
    async:
      request-timeout: 600000
  servlet:
    multipart:
      # 单个文件最大大小（10MB，与前端限制一致）
      max-file-size: 10MB
      # 整个请求最大大小（20MB，允许同时上传多个文件）
      max-request-size: 20MB
      # 文件写入磁盘的阈值（超过此大小会写入临时文件）
      file-size-threshold: 2MB

# Dify配置
dify:
  api:
    # 默认Dify API Base URL
    default-base-url: http://localhost:80
    # 默认超时时间（毫秒）
    timeout: 30000
    # 连接超时时间（毫秒）
    connect-timeout: 10000
    # 文件URL前缀（用于拼接相对路径的文件URL）
    file-url-prefix: http://localhost:80

# JWT配置
jwt:
  # JWT密钥（生产环境请修改为更安全的密钥）
  secret: dify-app-secret-key-2024
  # JWT过期时间（毫秒），默认7天
  expiration: 604800000