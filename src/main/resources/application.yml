server:
  port: 8081

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/difyapp
    username: postgres
    password: 123456
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false  # 关闭SQL打印
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # 关闭SQL格式化（因为show-sql已关闭）
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    # 异步请求超时时间（毫秒），设置为10分钟以支持长时间运行的Workflow任务
    async:
      request-timeout: 600000
  servlet:
    multipart:
      # 单个文件最大大小（100MB，知识库文件上传）
      max-file-size: 100MB
      # 整个请求最大大小（200MB，允许同时上传多个文件）
      max-request-size: 200MB
      # 文件写入磁盘的阈值（超过此大小会写入临时文件）
      file-size-threshold: 2MB

# Dify配置
dify:
  api:
    # 默认Dify API Base URL
    default-base-url: http://localhost:80
    # 默认超时时间（毫秒）
    timeout: 30000
    # 连接超时时间（毫秒）
    connect-timeout: 10000
    # 文件URL前缀（用于拼接相对路径的文件URL）
    file-url-prefix: http://localhost:80

# JWT配置
jwt:
  # JWT密钥（生产环境请修改为更安全的密钥）
  secret: dify-app-secret-key-2024
  # JWT过期时间（毫秒），默认7天
  expiration: 604800000

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: knowledge-base

# Qdrant配置
qdrant:
  url: http://localhost:6333
  api-key: # 可选，Docker部署默认不需要，仅在启用认证时需要
  timeout: 30000

# 向量化配置
embedding:
  api-url: https://api.siliconflow.cn/v1/embeddings
  api-key: sk-ytefhuhdawouqdjzykdydxgfwtuuxpayevtdkfesyepbkquq
  model: Qwen/Qwen3-Embedding-8B
  timeout: 300000  # 5分钟超时，支持大文档向量化
  batch-size: 100
  # provider: openai  # 提供商类型：openai（默认，兼容 OpenAI API，包括 SiliconFlow、VLLM 等）、ollama
  # 使用示例：
  # - OpenAI/SiliconFlow/VLLM（默认）: provider: openai 或省略，api-url 包含完整路径或基础URL
  # - Ollama: provider: ollama, api-url: http://localhost:11434（不包含路径，会自动添加 /api/embeddings）

# RAG配置
rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 10  # 增加检索数量，从5增加到10
  similarity-threshold: 0.3  # 降低相似度阈值，从0.7降低到0.3，允许更多相关结果通过
  llm-api-url: https://api.siliconflow.cn  # 只配置基础URL，路径在代码中指定
  llm-api-key: sk-ytefhuhdawouqdjzykdydxgfwtuuxpayevtdkfesyepbkquq
  llm-model: Qwen/Qwen2.5-72B-Instruct  # 问答使用的大模型，根据您的API提供商选择合适的模型
  # provider: openai  # 提供商类型：openai（默认，兼容 OpenAI API，包括 SiliconFlow、VLLM 等）、ollama
  # 使用示例：
  # - OpenAI/SiliconFlow/VLLM（默认）: provider: openai 或省略，llm-api-url 包含完整路径或基础URL
  # - Ollama: provider: ollama, llm-api-url: http://localhost:11434（不包含路径，会自动添加 /api/chat）

# 注意：
# - LangChain4j 相关的配置已集成到上面的 embedding 和 rag 配置中
# - CustomEmbeddingModel 使用 embedding.* 配置
# - ConfigurableDocumentSplitter 使用 rag.chunk-size 和 rag.chunk-overlap 配置